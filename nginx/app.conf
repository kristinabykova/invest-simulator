server {
    listen 80;
    listen [::]:80;

    server_name invest-simulator.ddns.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name invest-simulator.ddns.net;

    ssl_certificate /etc/letsencrypt/live/invest-simulator.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/invest-simulator.ddns.net/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://invest_backend:8000;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        client_max_body_size 10M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}